name: Nightly Checks

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  API_LEVEL: 23
  ARCH: x86_64
  DISK_SIZE: 2048M

jobs:
  jvm-and-assemble:
    env:
      ORG_GRADLE_JVMARGS: "-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: JVM Tests and Assemble
        run: ./gradlew --console=plain spotlessCheck jvmTest :demo:jvmTest assemble

  screenshot-tests:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Screenshot Tests
        run: ./gradlew --console=plain :visual-regressions:jvmScreenshotTest

  discover-android-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Discover Android modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          modules="$(
            ./gradlew --console=plain tasks --all |
              awk -F: '/^composeunstyled-[^:]+:connectedDebugAndroidTest / { print ":" $1 }' |
              sort -u
          )"

          if [ -z "$modules" ]; then
            echo "No composeunstyled-* connectedDebugAndroidTest tasks found."
            exit 1
          fi

          modules_json="$(printf '%s\n' "$modules" | jq -R . | jq -s -c .)"
          echo "modules=$modules_json" >> "$GITHUB_OUTPUT"

  android-tests:
    name: ${{ matrix.module }}-android-tests
    needs: discover-android-modules
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-android-modules.outputs.modules) }}
    uses: ./.github/workflows/android-emulator-tests.yml
    with:
      module: ${{ matrix.module }}
      test-command: ./gradlew --console=plain ${{ matrix.module }}:connectedDebugAndroidTest

  report-failure:
    needs: [ jvm-and-assemble, screenshot-tests, discover-android-modules, android-tests ]
    if: ${{ always() && (needs.jvm-and-assemble.result == 'failure' || needs.screenshot-tests.result == 'failure' || needs.discover-android-modules.result == 'failure' || needs.android-tests.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Open GitHub issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Nightly checks are failing';
            const labels = ['nightly-failure'];
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const results = {
              'jvm-and-assemble': '${{ needs.jvm-and-assemble.result }}',
              'screenshot-tests': '${{ needs.screenshot-tests.result }}',
              'discover-android-modules': '${{ needs.discover-android-modules.result }}',
              'android-tests': '${{ needs.android-tests.result }}',
            };

            const body = [
              'Nightly checks failed on `main`.',
              '',
              `Workflow run: ${runUrl}`,
              '',
              'Job results:',
              ...Object.entries(results).map(([job, result]) => `- \`${job}\`: ${result}`),
              '',
              'Please inspect the failed job logs and fix `main` before cutting a release.',
            ].join('\n');

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 10,
            });
            const existingIssue = existingIssues.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body,
              });
              return;
            }

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labels[0],
                color: 'd73a4a',
                description: 'Main branch nightly validation is failing.',
              });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels,
            });
