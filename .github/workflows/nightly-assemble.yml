name: Nightly Assemble

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assemble:
    env:
      ORG_GRADLE_JVMARGS: "-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Assemble
        run: ./gradlew --console=plain assemble
