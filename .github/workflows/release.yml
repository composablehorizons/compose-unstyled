name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to test
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  spotless-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Spotless Check
        run: ./gradlew --console=plain spotlessCheck

  desktop-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Desktop Tests
        run: ./gradlew --console=plain jvmTest

  discover-android-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Discover composeunstyled Android modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          modules="$(
            ./gradlew --console=plain tasks --all |
              awk -F: '/^composeunstyled-[^:]+:connectedDebugAndroidTest / { print $1 }' |
              sed 's/^composeunstyled-//' |
              sort -u
          )"

          if [ -z "$modules" ]; then
            echo "No composeunstyled-* connectedDebugAndroidTest tasks found."
            exit 1
          fi

          modules_json="$(printf '%s\n' "$modules" | jq -R . | jq -s -c .)"
          echo "modules=$modules_json" >> "$GITHUB_OUTPUT"

  android-tests:
    name: ${{ matrix.module }}-android-tests
    needs: discover-android-modules
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_LEVEL: 23
      ARCH: x86_64
      DISK_SIZE: 2048M
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover-android-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Enable Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ env.ARCH }}-${{ env.DISK_SIZE }}

      - name: Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew --console=plain :composeunstyled-${{ matrix.module }}:connectedDebugAndroidTest

  publish:
    if: github.event_name == 'push'
    needs: [ spotless-check, desktop-tests, android-tests ]
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: gradle/actions/wrapper-validation@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        run: ./gradlew publishAllPublicationsToMavenCentral --no-configuration-cache

  github-release:
    if: github.event_name == 'push'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_REF#v}"
          changelog_content="$(
            sed -n "/## \\[$version\\]/,/## \\[/p" CHANGELOG.md |
              sed '$ d' |
              tail -n +2
          )"

          {
            echo "CHANGELOG_CONTENT<<EOF"
            echo "$changelog_content"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          name: ${{ env.RELEASE_REF }}
          body: ${{ env.CHANGELOG_CONTENT }}
