name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  issues: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  spotless-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Spotless Check
        run: ./gradlew --console=plain spotlessCheck

  desktop-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Desktop Tests
        run: ./gradlew --console=plain jvmTest :demo:jvmTest

  screenshot-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Screenshot Tests
        run: ./gradlew --console=plain :visual-regressions:jvmScreenshotTest

  discover-android-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Discover composeunstyled Android modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          modules="$(
            ./gradlew --console=plain tasks --all |
              awk -F: '/^composeunstyled-[^:]+:connectedDebugAndroidTest / { print $1 }' |
              sed 's/^composeunstyled-//' |
              sort -u
          )"

          if [ -z "$modules" ]; then
            echo "No composeunstyled-* connectedDebugAndroidTest tasks found."
            exit 1
          fi

          modules_json="$(printf '%s\n' "$modules" | jq -R . | jq -s -c .)"
          echo "modules=$modules_json" >> "$GITHUB_OUTPUT"

  android-tests:
    name: ${{ matrix.module }}-android-tests
    needs: discover-android-modules
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_LEVEL: 23
      ARCH: x86_64
      DISK_SIZE: 2048M
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover-android-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Enable Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ env.ARCH }}-${{ env.DISK_SIZE }}

      - name: Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew --console=plain :composeunstyled-${{ matrix.module }}:connectedDebugAndroidTest

  demo-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Build installable demo APK
        shell: bash
        run: ./gradlew --console=plain :demo:assembleDebug

      - name: Verify demo APK signing
        shell: bash
        run: |
          set -euo pipefail

          android_sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$android_sdk_root" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT must be set to verify APK signing."
            exit 1
          fi

          apk_path="demo/build/outputs/apk/debug/demo-debug.apk"
          apksigner="$(
            find "$android_sdk_root/build-tools" -type f -name apksigner |
              sort -V |
              tail -n 1
          )"

          if [ -z "$apksigner" ]; then
            echo "No apksigner executable found under $android_sdk_root/build-tools."
            exit 1
          fi

          expected_cert_sha256="7d19a99ad9ae519b90681aaff27bc9692c2f060a179fd539c67ba507c3ab9bd3"
          signing_report="$("$apksigner" verify --print-certs "$apk_path")"
          echo "$signing_report"

          actual_cert_sha256="$(
            printf '%s\n' "$signing_report" |
              awk -F': ' '/Signer #1 certificate SHA-256 digest/ { print $2 }'
          )"

          if [ "$actual_cert_sha256" != "$expected_cert_sha256" ]; then
            echo "Expected demo APK certificate $expected_cert_sha256, got $actual_cert_sha256."
            exit 1
          fi

          safe_release_ref="$(printf '%s' "$RELEASE_REF" | tr '/ ' '--')"
          release_apk_path="demo/build/outputs/apk/debug/compose-unstyled-demo-${safe_release_ref}.apk"
          cp "$apk_path" "$release_apk_path"

      - name: Upload demo APK
        uses: actions/upload-artifact@v4
        with:
          name: compose-unstyled-demo-apk
          path: demo/build/outputs/apk/debug/compose-unstyled-demo-*.apk
          if-no-files-found: error

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [ spotless-check, desktop-tests, screenshot-tests, android-tests, demo-apk ]
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: gradle/actions/wrapper-validation@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        run: ./gradlew publishAllPublicationsToMavenCentral --no-configuration-cache

  github-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download demo APK
        uses: actions/download-artifact@v4
        with:
          name: compose-unstyled-demo-apk
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          name: ${{ env.RELEASE_REF }}
          generate_release_notes: true
          draft: true
          files: release-artifacts/*.apk
          fail_on_unmatched_files: true

  report-failure:
    needs: [ spotless-check, desktop-tests, screenshot-tests, discover-android-modules, android-tests, demo-apk, publish, github-release ]
    if: ${{ always() && (needs.spotless-check.result == 'failure' || needs.desktop-tests.result == 'failure' || needs.screenshot-tests.result == 'failure' || needs.discover-android-modules.result == 'failure' || needs.android-tests.result == 'failure' || needs.demo-apk.result == 'failure' || needs.publish.result == 'failure' || needs.github-release.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Open GitHub issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseRef = '${{ env.RELEASE_REF }}';
            const title = `Release failed for ${releaseRef}`;
            const labels = ['release-failure'];
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const results = {
              'spotless-check': '${{ needs.spotless-check.result }}',
              'desktop-tests': '${{ needs.desktop-tests.result }}',
              'screenshot-tests': '${{ needs.screenshot-tests.result }}',
              'discover-android-modules': '${{ needs.discover-android-modules.result }}',
              'android-tests': '${{ needs.android-tests.result }}',
              'demo-apk': '${{ needs.demo-apk.result }}',
              'publish': '${{ needs.publish.result }}',
              'github-release': '${{ needs.github-release.result }}',
            };

            const body = [
              `Release failed for \`${releaseRef}\`.`,
              '',
              `Workflow run: ${runUrl}`,
              '',
              'Job results:',
              ...Object.entries(results).map(([job, result]) => `- \`${job}\`: ${result}`),
              '',
              'Please inspect the failed job logs and rerun the release once the issue is fixed.',
            ].join('\n');

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 10,
            });
            const existingIssue = existingIssues.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body,
              });
              return;
            }

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labels[0],
                color: 'd73a4a',
                description: 'Release workflow validation or publishing is failing.',
              });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels,
            });
