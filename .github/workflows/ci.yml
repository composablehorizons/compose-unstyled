name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  discover-android-modules:
    runs-on: ubuntu-latest
    outputs:
      android_modules: ${{ steps.discover.outputs.android_modules }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Discover Android modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          test_modules="$(
            find . \( -path './*/src/commonTest' -o -path './*/src/jvmTest' -o -path './*/src/desktopTest' -o -path './*/src/androidInstrumentedTest' \) -type d |
              awk -F/ '{ print ":" $2 }' |
              sort -u
          )"

          android_modules=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
            android_changed_modules="$(
              printf '%s\n' "$changed_files" |
                awk -F/ '$2 == "src" && ($3 == "androidMain" || $3 == "androidInstrumentedTest") { print ":" $1 }' |
                sort -u
            )"

            android_modules="$(
              comm -12 \
                <(printf '%s\n' "$test_modules" | sort -u) \
                <(printf '%s\n' "$android_changed_modules" | sort -u)
            )"
          fi

          if [ -z "$android_modules" ]; then
            echo "android_modules=[]" >> "$GITHUB_OUTPUT"
          else
            android_modules_json="$(printf '%s\n' "$android_modules" | jq -R . | jq -s -c .)"
            echo "android_modules=$android_modules_json" >> "$GITHUB_OUTPUT"
          fi

  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Fast Checks
        shell: bash
        run: |
          set -euo pipefail

          test_modules="$(
            find . \( -path './*/src/commonTest' -o -path './*/src/jvmTest' -o -path './*/src/desktopTest' -o -path './*/src/androidInstrumentedTest' \) -type d |
              awk -F/ '{ print ":" $2 }' |
              sort -u
          )"

          changed_modules=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"

            while IFS= read -r file; do
              module="${file%%/*}"
              if [ "$module" != "$file" ] && [ -f "$module/build.gradle.kts" ]; then
                printf ':%s\n' "$module"
              fi
            done <<< "$changed_files" > /tmp/changed-modules.txt
            changed_modules="$(sort -u /tmp/changed-modules.txt)"
          else
            changed_modules="$test_modules"
          fi

          jvm_modules="$(
            comm -12 \
              <(printf '%s\n' "$test_modules" | sort -u) \
              <(printf '%s\n' "$changed_modules" | sort -u)
          )"

          compile_modules="$(
            comm -23 \
              <(printf '%s\n' "$changed_modules" | sort -u) \
              <(printf '%s\n' "$test_modules" | sort -u)
          )"

          tasks=(spotlessCheck :demo:jvmTest)
          all_tasks=""

          load_all_tasks() {
            if [ -z "$all_tasks" ]; then
              all_tasks="$(./gradlew --console=plain tasks --all)"
            fi
          }

          while IFS= read -r module; do
            if [ -n "$module" ]; then
              load_all_tasks
              module_name="${module#:}"
              module_test_tasks="$(
                printf '%s\n' "$all_tasks" |
                  awk -v module="$module_name" '$0 ~ "^" module ":(jvmTest|desktopTest)( |$)" { print ":" $1 }' |
                  sort -u
              )"

              if [ -z "$module_test_tasks" ]; then
                echo "No JVM/Desktop test tasks found for $module."
                exit 1
              fi

              while IFS= read -r task; do
                tasks+=("$task")
              done <<< "$module_test_tasks"
            fi
          done <<< "$jvm_modules"

          if [ -n "$compile_modules" ]; then
            load_all_tasks
            while IFS= read -r module; do
              if [ -z "$module" ]; then
                continue
              fi
              module_name="${module#:}"
              module_tasks="$(
                printf '%s\n' "$all_tasks" |
                  awk -v module="$module_name" '$0 ~ "^" module ":compile(Kotlin(Jvm|Desktop)|DebugKotlin(Android)?)( |$)" { print ":" $1 }' |
                  sort -u
              )"

              if [ -z "$module_tasks" ]; then
                echo "No JVM/Desktop/Android Kotlin compile tasks found for $module."
                exit 1
              fi

              while IFS= read -r task; do
                tasks+=("$task")
              done <<< "$module_tasks"
            done <<< "$compile_modules"
          fi

          printf 'Running fast check tasks:\n'
          printf '  %s\n' "${tasks[@]}"
          ./gradlew --console=plain "${tasks[@]}"

  android-tests:
    name: ${{ matrix.module }}-android-tests
    needs: [ discover-android-modules, fast-checks ]
    if: needs.discover-android-modules.outputs.android_modules != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_LEVEL: 23
      ARCH: x86_64
      DISK_SIZE: 2048M
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover-android-modules.outputs.android_modules) }}
    steps:
      - name: Enable Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - uses: actions/checkout@v5

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Restore AVD
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ env.ARCH }}-${{ env.DISK_SIZE }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew --console=plain ${{ matrix.module }}:connectedDebugAndroidTest
