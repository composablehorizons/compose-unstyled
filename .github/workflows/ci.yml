name: CI

on:
  push:
    branches: [ main, v2 ]
  pull_request:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      core_modules: ${{ steps.generate.outputs.core_modules }}
    steps:
      - uses: actions/checkout@v5
      - name: Generate module list
        id: generate
        run: |
          all_modules=$(grep '^include(":' settings.gradle.kts | sed 's/include("://' | sed 's/")//' | jq -R . | jq -s -c .)
          core_modules=$(echo "$all_modules" | jq -c '[.[] | select((startswith("demo") | not) and . != "playground-android")]')
          echo "core_modules=$core_modules" >> $GITHUB_OUTPUT

  build:
    needs: setup
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.setup.outputs.core_modules) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: gradle/actions/wrapper-validation@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Assemble (${{ matrix.module }})
        run: |
          ./gradlew --console=plain :${{ matrix.module }}:assemble

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-outputs-core-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/build/classes
            ${{ matrix.module }}/build/libs
            ${{ matrix.module }}/build/generated
            ${{ matrix.module }}/build/kotlin
          retention-days: 1

  code-style-check:
    name: Check code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: gradle/actions/wrapper-validation@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify Code Style
        run: ./gradlew --console=plain spotlessCheck

  desktop-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: build-outputs-core-*
          merge-multiple: true

      - name: Desktop Tests
        run: ./gradlew --console=plain jvmTest

  android-tests:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_LEVEL: 23
      ARCH: x86_64
      DISK_SIZE: 2048M
    strategy:
      matrix:
        module: [ primitives, theming, platformtheme ]
    steps:
      - name: Enable Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Restore AVD
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ env.ARCH }}-${{ env.DISK_SIZE }}

      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: build-outputs-core-*
          merge-multiple: true

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: ${{ env.ARCH }}
          disk-size: ${{ env.DISK_SIZE }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew --console=plain composeunstyled-${{ matrix.module }}:connectedDebugAndroidTest
